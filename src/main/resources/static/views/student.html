<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <meta charset="UTF-8">
    <link href="../easyui/themes/bootstrap/easyui.css" rel="stylesheet" type="text/css">
    <link href="../easyui/themes/icon.css" rel="stylesheet" type="text/css">
    <link href="../easyui/themes/color.css" rel="stylesheet" type="text/css">
    <script src="../easyui/jquery.min.js" type="text/javascript"></script>
    <script src="../easyui/jquery.easyui.min.js" type="text/javascript"></script>
    <script src="../easyui/locale/easyui-lang-zh_CN.js" type="text/javascript"></script>
    <style type="text/css">
        body {
            font-family: microsoft yahei;
        }
    </style>
</head>
<body>
<div style="width:100%">
    <h2>Student Management</h2>

    <table class="easyui-datagrid" fitColumns="true" id="dg"
           pagination="true"
           rownumbers="true" singleSelect="true"
           title="Student List" toolbar="#toolbar" method="get" url="/student">
        <thead>
        <tr>
            <th field="id" width="50">ID</th>
            <th field="stuNum" width="50">Student No.</th>
            <th field="name" width="50">Name</th>
        </tr>
        </thead>
    </table>
    <div id="toolbar">
        <a class="easyui-linkbutton" data-perm="PERM_USER_ROLE_ASSIGN" href="javascript:void(0)" iconCls="icon-add" onclick="newStudent()"
           plain="true">Add</a>
        <a class="easyui-linkbutton" data-perm="PERM_USER_ROLE_ASSIGN" href="javascript:void(0)" iconCls="icon-edit" onclick="editStudent()"
           plain="true">Edit</a>
        <a class="easyui-linkbutton" data-perm="PERM_USER_ROLE_ASSIGN" href="javascript:void(0)" iconCls="icon-remove"
           onclick="destroyStudent()"
           plain="true">Delete</a>
    </div>

    <div class="easyui-dialog" data-options="closed:true,modal:true,border:'thin',buttons:'#dlg-buttons'" id="dlg"
         style="width:400px">
        <form id="fm" method="POST" novalidate style="margin:0;padding:20px 50px">
            <h3>Student Information</h3>
            <div style="margin-bottom:10px">
                <input class="easyui-textbox" label="Student No.:" prompt="Input student number" name="stuNum" required="true"
                       data-options="multiline:false,validType:'length[8,16]'" id="stuNumInput"
                       style="width:100%">
            </div>
            <div style="margin-bottom:10px">
                <input class="easyui-textbox" label="Name:" prompt="Input name" name="name" required="true"
                       data-options="multiline:false,validType:'length[1,16]'" id="nameInput"
                       style="width:100%">
            </div>
            <div style="margin-bottom:10px">
                <input class="easyui-passwordbox" label="Password:" prompt="Input password" name="password" required="true"
                       data-options="multiline:false,validType:'length[6,16]'"
                       style="width:100%">
            </div>
        </form>
    </div>

    <div id="dlg-buttons">
        <a id="savebtn" href="#" class="easyui-linkbutton" iconCls="icon-ok" style="width:90px"
           onclick="saveStudent()">Save</a>
        <a id="closebtn" href="#" class="easyui-linkbutton" iconCls="icon-cancel"
           onclick="javascript:$('#dlg').dialog('close')" style="width:90px">Cancel</a>
    </div>
</div>

<script type="text/javascript">
    var cmd;
    var permissions = [];
    var writePermission = 'PERM_USER_ROLE_ASSIGN';

    $(function () {
        loadPermissions();
    });

    function loadPermissions() {
        $.ajax({
            url: '/admin/permissions/current',
            method: 'GET',
            dataType: 'json',
            statusCode: {
                200: function (data) {
                    permissions = data || [];
                    applyPermissionUI();
                },
                401: function () {
                    window.location.href = '/index';
                }
            },
            error: function (xhr) {
                if (xhr.status !== 401) {
                    $.messager.alert('Error', 'Failed to load current permissions.');
                }
            }
        });
    }

    function applyPermissionUI() {
        var canWrite = hasPermission(writePermission);
        $('[data-perm="' + writePermission + '"]').toggle(canWrite);
        if (!canWrite) {
            $('#dlg').dialog('close');
        }
    }

    function hasPermission(permissionCode) {
        return $.inArray(permissionCode, permissions) >= 0;
    }

    function ensureWritePermission() {
        if (!hasPermission(writePermission)) {
            $.messager.alert('Forbidden', 'You do not have permission for this operation.');
            return false;
        }
        return true;
    }

    function newStudent() {
        if (!ensureWritePermission()) {
            return;
        }

        $('#dlg').dialog('open').dialog('center').dialog('setTitle', 'Add Student');
        $('#stuNumInput').textbox({readonly: false});
        $('#nameInput').textbox({readonly: false});
        $('#fm').form('clear');

        cmd = 'POST';
    }

    function editStudent() {
        if (!ensureWritePermission()) {
            return;
        }

        var row = $('#dg').datagrid('getSelected');
        if (row) {
            $('#dlg').dialog('open').dialog('center').dialog('setTitle', 'Edit Student');
            $('#stuNumInput').textbox({readonly: true});
            $('#nameInput').textbox({readonly: true});
            $('#fm').form('load', row);

            cmd = 'PUT';
        }
    }

    function saveStudent() {
        if (!ensureWritePermission()) {
            return;
        }

        if (!cmd) {
            $.messager.alert('Hint', 'Please choose Add or Edit first.');
            return;
        }

        var d = {};
        var t = $('#fm').serializeArray();
        $.each(t, function () {
            d[this.name] = this.value;
        });

        $.ajax({
            url: '/student',
            type: cmd,
            contentType: 'application/json',
            dataType: 'json',
            data: JSON.stringify(d),
            statusCode: {
                200: function () {
                    $('#dlg').dialog('close');
                    $('#dg').datagrid('reload');
                },
                400: function () {
                    $.messager.alert('Hint', 'Operation failed.');
                },
                401: function () {
                    window.location.href = '/index';
                },
                403: function () {
                    $.messager.alert('Forbidden', 'You do not have permission for this operation.');
                }
            }
        });
    }

    function destroyStudent() {
        if (!ensureWritePermission()) {
            return;
        }

        var selectStu = $('#dg').datagrid('getSelected');
        if (selectStu) {
            $.messager.confirm('Confirm', 'Delete this student?', function (committed) {
                if (committed) {
                    $.ajax({
                        url: '/student',
                        method: 'DELETE',
                        contentType: 'application/json; charset=utf-8',
                        dataType: 'json',
                        data: JSON.stringify({stuNum: selectStu.stuNum}),
                        statusCode: {
                            200: function () {
                                $('#dlg').dialog('close');
                                $('#dg').datagrid('reload');
                            },
                            400: function () {
                                $.messager.alert('Hint', 'Delete failed.');
                            },
                            401: function () {
                                window.location.href = '/index';
                            },
                            403: function () {
                                $.messager.alert('Forbidden', 'You do not have permission for this operation.');
                            }
                        }
                    });
                }
            });
        }
    }
</script>
</body>
</html>
