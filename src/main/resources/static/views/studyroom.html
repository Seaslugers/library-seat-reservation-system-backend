<!DOCTYPE html>
<html>
<head>
    <title>Study Room Management</title>
    <meta charset="UTF-8">
    <link href="../easyui/themes/bootstrap/easyui.css" rel="stylesheet" type="text/css">
    <link href="../easyui/themes/icon.css" rel="stylesheet" type="text/css">
    <link href="../easyui/themes/color.css" rel="stylesheet" type="text/css">
    <script src="../easyui/jquery.min.js" type="text/javascript"></script>
    <script src="../easyui/jquery.easyui.min.js" type="text/javascript"></script>
    <script src="../easyui/locale/easyui-lang-zh_CN.js" type="text/javascript"></script>
    <style type="text/css">
        body {
            font-family: microsoft yahei;
        }

        #readonlyTip {
            display: none;
            margin: 8px 0;
            color: #666;
        }
    </style>
</head>
<body>
<div style="width:100%">
    <h2>Study Room Management</h2>
    <p id="readonlyTip">Read-only mode: no write permission for study room management.</p>

    <table class="easyui-datagrid" fitColumns="true" id="dg"
           pagination="true"
           rownumbers="true" singleSelect="true"
           title="Study Room Information" toolbar="#toolbarRoom" method="get">
        <thead>
        <tr>
            <th field="id" width="50">ID</th>
            <th field="buildingNum" width="50">Building</th>
            <th field="classRoomNum" width="50">Classroom</th>
        </tr>
        </thead>
    </table>
    <div id="toolbarRoom">
        <a class="easyui-linkbutton" data-perm="PERM_STUDYROOM_MANAGE" href="javascript:void(0)" iconCls="icon-add"
           plain="true">Add</a>
        <a class="easyui-linkbutton" data-perm="PERM_STUDYROOM_MANAGE" href="javascript:void(0)" iconCls="icon-edit"
           plain="true">Edit</a>
        <a class="easyui-linkbutton" data-perm="PERM_STUDYROOM_MANAGE" href="javascript:void(0)" iconCls="icon-remove"
           plain="true">Delete</a>
    </div>
</div>

<script type="text/javascript">
    var permissions = [];
    var writePermission = 'PERM_STUDYROOM_MANAGE';

    $(function () {
        loadPermissions();
    });

    function loadPermissions() {
        $.ajax({
            url: '/admin/permissions/current',
            method: 'GET',
            dataType: 'json',
            statusCode: {
                200: function (data) {
                    permissions = data || [];
                    applyPermissionUI();
                },
                401: function () {
                    window.location.href = '/index';
                }
            },
            error: function (xhr) {
                if (xhr.status !== 401) {
                    $.messager.alert('Error', 'Failed to load current permissions.');
                }
            }
        });
    }

    function hasPermission(permissionCode) {
        return $.inArray(permissionCode, permissions) >= 0;
    }

    function applyPermissionUI() {
        var canWrite = hasPermission(writePermission);
        $('[data-perm="' + writePermission + '"]').toggle(canWrite);
        $('#readonlyTip').toggle(!canWrite);
    }
</script>
</body>
</html>
